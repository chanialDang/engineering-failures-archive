<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="236 400 727 500" xmlns="http://www.w3.org/2000/svg" width="727" height="500" font-family="Georgia, 'Times New Roman', serif">
<defs>
  <style>
    .label-sm { font-size: 9px; }
    .label-md { font-size: 11px; }
    .label-lg { font-size: 13px; }
    .bold { font-weight: bold; }
    .mono { font-family: 'Courier New', monospace; }
  </style>
</defs>

<rect x="236" y="400" width="727" height="500" fill="#faf6ee" stroke="#c8bca8" stroke-width="1"/>
<rect x="236" y="400" width="727" height="24" fill="#3a2e1e"/>
<text x="600" y="416" text-anchor="middle" font-size="10" fill="#f0ece4" letter-spacing="1.5">B — TEMPERATURE DATA &amp; DECISIONS</text>

<text x="600" y="442" text-anchor="middle" font-size="9" fill="#2a2218" font-weight="bold">O-ring distress incidents vs. joint temperature (all prior flights)</text>
<text x="600" y="456" text-anchor="middle" font-size="8" fill="#5a4a28" font-style="italic">Red = incident recorded · Green = no incident</text>

<!-- Chart area -->
<rect x="448" y="464" width="320" height="160" fill="#f0ece0" stroke="#c8bca8" stroke-width="1"/>

<!-- X axis baseline -->
<line x1="448" y1="624" x2="768" y2="624" stroke="#2a2218" stroke-width="1.5"/>

<!-- X axis label — moved down to y=668 to clear all tick sub-labels -->
<text x="608" y="668" text-anchor="middle" font-size="8" fill="#4a3a20">Joint Temperature (°F)</text>

<!-- Tick at 28 — Challenger launch temp -->
<line x1="448" y1="624" x2="448" y2="628" stroke="#2a2218" stroke-width="1"/>
<text x="448" y="637" text-anchor="middle" font-size="7.5" fill="#c0392b" font-weight="bold">28</text>

<!-- Tick at 48 -->
<line x1="560" y1="624" x2="560" y2="628" stroke="#2a2218" stroke-width="1"/>
<text x="560" y="637" text-anchor="middle" font-size="7.5" fill="#2a2218">48</text>

<!-- Tick at 53 — qualification minimum: number + sub-label, clear gap above x-axis label -->
<line x1="616" y1="624" x2="616" y2="628" stroke="#2a2218" stroke-width="1"/>
<text x="616" y="637" text-anchor="middle" font-size="7.5" fill="#2a8a2a" font-weight="bold">53</text>
<text x="616" y="648" text-anchor="middle" font-size="6.5" fill="#2a8a2a">qual min</text>

<!-- Tick at 63 -->
<line x1="672" y1="624" x2="672" y2="628" stroke="#2a2218" stroke-width="1"/>
<text x="672" y="637" text-anchor="middle" font-size="7.5" fill="#2a2218">63</text>

<!-- Tick at 73 -->
<line x1="728" y1="624" x2="728" y2="628" stroke="#2a2218" stroke-width="1"/>
<text x="728" y="637" text-anchor="middle" font-size="7.5" fill="#2a2218">73</text>

<!-- Tick at 80 -->
<line x1="768" y1="624" x2="768" y2="628" stroke="#2a2218" stroke-width="1"/>
<text x="768" y="637" text-anchor="middle" font-size="7.5" fill="#2a2218">80</text>

<!-- Y axis -->
<line x1="448" y1="464" x2="448" y2="624" stroke="#2a2218" stroke-width="1.5"/>
<text x="432" y="468" text-anchor="end" font-size="7" fill="#2a2218">4</text>
<text x="432" y="508" text-anchor="end" font-size="7" fill="#2a2218">3</text>
<text x="432" y="548" text-anchor="end" font-size="7" fill="#2a2218">2</text>
<text x="432" y="588" text-anchor="end" font-size="7" fill="#2a2218">1</text>
<text x="432" y="624" text-anchor="end" font-size="7" fill="#2a2218">0</text>
<text x="418" y="544" text-anchor="middle" font-size="7.5" fill="#4a3a20" transform="rotate(-90,418,544)">O-ring incidents</text>

<!-- Grid lines -->
<line x1="448" y1="584" x2="768" y2="584" stroke="#c8bca8" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="448" y1="544" x2="768" y2="544" stroke="#c8bca8" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="448" y1="504" x2="768" y2="504" stroke="#c8bca8" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- No-data zone -->
<rect x="448" y="464" width="168" height="160" fill="#c0392b" opacity="0.06"/>
<line x1="616" y1="464" x2="616" y2="624" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="4,3"/>
<text x="532" y="476" text-anchor="middle" font-size="7" fill="#c0392b" font-style="italic">no flight data</text>
<text x="532" y="487" text-anchor="middle" font-size="7" fill="#c0392b" font-style="italic">in this range</text>

<!-- Data points -->
<circle cx="616" cy="544" r="5.5" fill="#c0392b" opacity="0.9"/>
<circle cx="641" cy="504" r="5.5" fill="#c0392b" opacity="0.9"/>
<circle cx="674" cy="584" r="5.5" fill="#c0392b" opacity="0.9"/>
<circle cx="690" cy="624" r="5.5" fill="#2a7a2a" opacity="0.9"/>
<circle cx="714" cy="584" r="5.5" fill="#c0392b" opacity="0.9"/>
<circle cx="725" cy="624" r="5.5" fill="#2a7a2a" opacity="0.9"/>
<circle cx="742" cy="624" r="5.5" fill="#2a7a2a" opacity="0.9"/>
<circle cx="759" cy="624" r="5.5" fill="#2a7a2a" opacity="0.9"/>

<!-- Challenger point -->
<circle cx="448" cy="476" r="9" fill="#c0392b" stroke="#8a1808" stroke-width="2.5"/>
<text x="448" y="480" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">!</text>
<line x1="448" y1="485" x2="448" y2="627" stroke="#c0392b" stroke-width="1" stroke-dasharray="2,2"/>

<!-- Legend — moved down to y=680 to sit below "Joint Temperature" label -->
<circle cx="456" cy="680" r="5" fill="#c0392b"/>
<text x="466" y="684" font-size="8" fill="#4a3a20">O-ring incident recorded</text>
<circle cx="580" cy="680" r="5" fill="#2a7a2a"/>
<text x="590" y="684" font-size="8" fill="#4a3a20">No incident</text>
<circle cx="686" cy="680" r="8" fill="#c0392b" stroke="#8a1808" stroke-width="1.5"/>
<text x="686" y="683" font-size="7.5" fill="#fff" font-weight="bold" text-anchor="middle">!</text>
<text x="700" y="684" font-size="8" fill="#c0392b" font-weight="bold">Challenger (28°F)</text>

<!-- Management override box -->
<rect x="408" y="694" width="384" height="90" fill="#f0e8d8" stroke="#c0a870" stroke-width="1" rx="3"/>
<text x="600" y="711" text-anchor="middle" font-size="9.5" fill="#2a2218" font-weight="bold">Management Override — Rogers Commission Finding</text>
<line x1="414" y1="716" x2="786" y2="716" stroke="#c0a870" stroke-width="0.8"/>
<text x="600" y="730" text-anchor="middle" font-size="8" fill="#4a3a20">Morton Thiokol engineers submitted formal launch objection at 8:45 PM, 27 Jan 1986.</text>
<text x="600" y="744" text-anchor="middle" font-size="8" fill="#4a3a20">NASA management asked Thiokol to "take off your engineer hat and put on your</text>
<text x="600" y="758" text-anchor="middle" font-size="8" fill="#c0392b" font-weight="bold">management hat." Engineers' concerns had been raised in writing 13 prior times.</text>
<text x="600" y="772" text-anchor="middle" font-size="8" fill="#4a3a20">Launch proceeded at 11:38 AM. Commission found organisational culture equally culpable.</text>
</svg>