<text x="740" y="267" font-size="8" fill="#a0b8d0">Cdr. Francis Scobee</text>
<text x="740" y="280" font-size="8" fill="#a0b8d0">Plt. Michael Smith</text>
<text x="740" y="293" font-size="8" fill="#a0b8d0">MS  Ellison Onizuka</text>
<text x="740" y="306" font-size="8" fill="#a0b8d0">MS  Judith Resnik</text>
<text x="740" y="319" font-size="8" fill="#a0b8d0">MS  Ronald McNair</text>
<text x="740" y="332" font-size="8" fill="#a0b8d0">PS  Gregory Jarvis</text>
<text x="740" y="345" font-size="8" fill="#a0c8d8">PS  Christa McAuliffe  (Teacher in Space)</text>

<rect x="958" y="232" width="210" height="108" fill="#1e1810" stroke="#c0a870" stroke-width="0.8" rx="3"/>
<text x="1063" y="249" text-anchor="middle" font-size="9" fill="#c0a870">Technical Parameters</text>
<line x1="964" y1="253" x2="1162" y2="253" stroke="#c0a870" stroke-width="0.6"/>
<text x="964" y="268" font-size="7.5" fill="#d0c8b8">SRB thrust (each):   3.3M lbf</text>
<text x="964" y="282" font-size="7.5" fill="#d0c8b8">ET propellant:        1.6M lbs total</text>
<text x="964" y="296" font-size="7.5" fill="#d0c8b8">LH₂ stored at:        −423°F</text>
<text x="964" y="310" font-size="7.5" fill="#d0c8b8">LOX stored at:        −297°F</text>
<text x="964" y="324" font-size="7.5" fill="#d0c8b8">Breakup altitude:    46,000 ft</text>
<text x="964" y="338" font-size="7.5" fill="#c0392b">Breakup velocity:    Mach 1.92</text>

