<rect x="524" y="158" width="156" height="30" fill="#3a1208" rx="2" opacity="0.92"/>
<text x="602" y="171" text-anchor="middle" font-size="8.5" fill="#e06040" font-weight="bold">Flame plume path</text>
<text x="602" y="183" text-anchor="middle" font-size="7.5" fill="#d0c8b8">escaping field joint</text>
