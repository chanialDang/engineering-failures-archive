<line x1="720" y1="58" x2="720" y2="803" stroke="#c0a870" stroke-width="1.5"/>
<rect x="720" y="58" width="480" height="28" fill="#2a2218"/>
<text x="960" y="77" text-anchor="middle" font-size="10" fill="#c0a870" letter-spacing="2">KEY PARAMETERS &amp; CONTEXT</text>

<rect x="734" y="98" width="210" height="70" fill="#3a1208" stroke="#c0392b" stroke-width="1" rx="3"/>
<text x="839" y="116" text-anchor="middle" font-size="9" fill="#c0a870">Launch Temperature</text>
<text x="839" y="148" text-anchor="middle" font-size="28" fill="#e04030" font-weight="bold">28°F</text>
<text x="839" y="162" text-anchor="middle" font-size="9" fill="#c09080">−2°C  ·  Record cold for a launch</text>

<rect x="958" y="98" width="210" height="70" fill="#0e2a0e" stroke="#2a8a2a" stroke-width="1" rx="3"/>
<text x="1063" y="116" text-anchor="middle" font-size="9" fill="#c0a870">O-ring Qualified To</text>
<text x="1063" y="148" text-anchor="middle" font-size="28" fill="#40cc40" font-weight="bold">53°F</text>
<text x="1063" y="162" text-anchor="middle" font-size="9" fill="#90c890">12°C  ·  Design lower limit</text>

<rect x="734" y="182" width="434" height="36" fill="#2a1a08" stroke="#c0a870" stroke-width="0.8" rx="2"/>
<text x="951" y="196" text-anchor="middle" font-size="9" fill="#e0c080" font-weight="bold">25°F below qualification — O-ring stiffness increased 6× at launch temperature</text>
<text x="951" y="212" text-anchor="middle" font-size="8.5" fill="#c09060">Cold rubber loses resilience and cannot seat against joint gaps under ignition pressure</text>

<rect x="734" y="232" width="210" height="108" fill="#1a1a2a" stroke="#3a6a9a" stroke-width="1" rx="3"/>
<text x="839" y="249" text-anchor="middle" font-size="9" fill="#c0a870">Seven Crew Members</text>
