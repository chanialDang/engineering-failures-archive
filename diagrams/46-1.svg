<rect x="18" y="95" width="156" height="30" fill="#1e1810" rx="2" opacity="0.92"/>
<text x="96" y="108" text-anchor="middle" font-size="8" fill="#c0a870" font-weight="bold" class="mono">T+0.678s</text>
<text x="96" y="120" text-anchor="middle" font-size="7.5" fill="#d0c8b8">First O-ring smoke visible</text>
<line x1="174" y1="110" x2="258" y2="220" stroke="#c0a870" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-amber)"/>

<rect x="18" y="140" width="156" height="30" fill="#3a1208" rx="2" opacity="0.92"/>
<text x="96" y="153" text-anchor="middle" font-size="8" fill="#e06040" font-weight="bold" class="mono">T+58.788s</text>
<text x="96" y="165" text-anchor="middle" font-size="7.5" fill="#d0c8b8">Continuous flame from joint</text>
<line x1="174" y1="158" x2="416" y2="248" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>

