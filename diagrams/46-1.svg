<text x="602" y="249" text-anchor="middle" font-size="8.5" fill="#ff6040" font-weight="bold">SRB Field Joint</text>
<text x="602" y="261" text-anchor="middle" font-size="7.5" fill="#d0c8b8">PRIMARY FAILURE POINT</text>
<line x1="524" y1="251" x2="470" y2="248" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-red)"/>

