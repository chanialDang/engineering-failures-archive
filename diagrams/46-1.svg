<text x="600" y="46" text-anchor="middle" font-size="10" fill="#c0a870" letter-spacing="2">STS-51-L  ·  28 JANUARY 1986  ·  CAPE CANAVERAL, FL  ·  VEHICLE BREAKUP AT T+73 SECONDS</text>

