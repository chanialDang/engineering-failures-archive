<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="-168 400 727 500" xmlns="http://www.w3.org/2000/svg" width="727" height="500" font-family="Georgia, 'Times New Roman', serif">
<defs>
  <style>
    .label-sm { font-size: 9px; }
    .label-md { font-size: 11px; }
    .label-lg { font-size: 13px; }
    .bold { font-weight: bold; }
    .mono { font-family: 'Courier New', monospace; }
  </style>
  <marker id="arr-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#c0392b"/>
  </marker>
</defs>

<rect x="-168" y="400" width="727" height="500" fill="#faf6ee" stroke="#c8bca8" stroke-width="1"/>
<rect x="-168" y="400" width="727" height="24" fill="#3a2e1e"/>
<text x="195" y="416" text-anchor="middle" font-size="10" fill="#f0ece4" letter-spacing="1.5">A — O-RING JOINT CROSS-SECTION</text>

<text x="105" y="442" text-anchor="middle" font-size="9" fill="#2a7a2a" font-weight="bold">NOMINAL — Warm Temperature</text>
<rect x="26" y="450" width="156" height="24" fill="#8a8880" stroke="#2a2218" stroke-width="1" rx="1"/>
<text x="104" y="466" text-anchor="middle" font-size="8" fill="#f0e8d8">Upper Tang Segment</text>
<rect x="26" y="474" width="156" height="38" fill="#ddd8cc"/>
<rect x="26" y="474" width="50" height="38" fill="#c8b888" opacity="0.75"/>
<text x="51" y="497" text-anchor="middle" font-size="7" fill="#5a4a20">PUTTY</text>
<ellipse cx="104" cy="485" rx="16" ry="8" fill="#2a8a2a" stroke="#1a5a1a" stroke-width="1.5"/>
<text x="104" y="488" text-anchor="middle" font-size="7" fill="#e0f0e0" font-weight="bold">PRIMARY</text>
<ellipse cx="148" cy="495" rx="13" ry="7" fill="#1a6a1a" stroke="#0a4a0a" stroke-width="1.2"/>
<text x="148" y="498" text-anchor="middle" font-size="7" fill="#e0f0e0">BACKUP</text>
<rect x="26" y="512" width="156" height="24" fill="#8a8880" stroke="#2a2218" stroke-width="1" rx="1"/>
<text x="104" y="528" text-anchor="middle" font-size="8" fill="#f0e8d8">Lower Clevis Segment</text>
<text x="104" y="552" text-anchor="middle" font-size="8.5" fill="#2a8a2a" font-weight="bold">✓ Combustion gas path sealed</text>

<text x="210" y="462" font-size="8" fill="#2a7a2a">O-ring elastic at 53°F+</text>
<text x="210" y="475" font-size="8" fill="#2a7a2a">Seats quickly to joint</text>
<text x="210" y="488" font-size="8" fill="#2a7a2a">Seals gas path completely</text>
<text x="210" y="501" font-size="8" fill="#2a7a2a">Both rings provide backup</text>

<line x1="12" y1="566" x2="378" y2="566" stroke="#c8bca8" stroke-width="1" stroke-dasharray="5,4"/>

<text x="195" y="585" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">FAILED — 28°F Launch Conditions</text>
<rect x="26" y="594" width="156" height="24" fill="#8a8880" stroke="#2a2218" stroke-width="1" rx="1"/>
<text x="104" y="610" text-anchor="middle" font-size="8" fill="#f0e8d8">Upper Tang Segment</text>
<rect x="26" y="618" width="156" height="46" fill="#ddd8cc"/>
<path d="M 30,618 L 30,640" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-red)"/>
<path d="M 178,618 L 178,640" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-red)"/>
<text x="104" y="633" text-anchor="middle" font-size="7" fill="#c0392b" font-style="italic">gap opens wider under ignition pressure</text>

<ellipse cx="104" cy="648" rx="16" ry="6" fill="#c0392b" stroke="#8a1818" stroke-width="1.5"/>
<text x="104" y="651" text-anchor="middle" font-size="7" fill="#ffe0d8" font-weight="bold">STIFF / COLD</text>

<path d="M 30,640 L 30,663" stroke="#ff6020" stroke-width="4" marker-end="url(#arr-red)"/>
<path d="M 56,640 L 56,663" stroke="#ff6020" stroke-width="3.5" marker-end="url(#arr-red)" opacity="0.6"/>
<text x="19" y="657" font-size="7" fill="#e05020" font-weight="bold" transform="rotate(-90,19,657)">HOT GAS</text>

<rect x="26" y="664" width="156" height="24" fill="#8a8880" stroke="#2a2218" stroke-width="1" rx="1"/>
<text x="104" y="680" text-anchor="middle" font-size="8" fill="#f0e8d8">Lower Clevis Segment</text>

<rect x="200" y="594" width="178" height="100" fill="#ffe8e0" stroke="#c0392b" stroke-width="0.8" rx="2"/>
<text x="289" y="610" text-anchor="middle" font-size="8.5" fill="#c0392b" font-weight="bold">Why cold O-rings fail:</text>
<text x="200" y="626" font-size="7.5" fill="#5a2010">  • Rubber stiffens ~6× at 28°F</text>
<text x="200" y="640" font-size="7.5" fill="#5a2010">  • Cannot follow joint rotation</text>
<text x="200" y="654" font-size="7.5" fill="#5a2010">  • Gap opens on ignition (~0.06")</text>
<text x="200" y="668" font-size="7.5" fill="#5a2010">  • 5,800°F gas bypasses ring</text>
<text x="200" y="682" font-size="7.5" fill="#c0392b" font-weight="bold">  • Erosion begins at T+0.678s</text>

<text x="104" y="710" text-anchor="middle" font-size="8.5" fill="#c0392b" font-weight="bold">✗ Gas path NOT sealed — failure initiated</text>

<text x="195" y="732" text-anchor="middle" font-size="7.5" fill="#8a7a60" font-style="italic">Ref: Rogers Commission Report Vol. I, Chapter IV (1986)</text>
<text x="195" y="746" text-anchor="middle" font-size="7.5" fill="#8a7a60" font-style="italic">and Feynman personal appendix to Rogers Report</text>
</svg>
