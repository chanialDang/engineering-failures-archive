<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="641 400 727 500" xmlns="http://www.w3.org/2000/svg" width="727" height="500" font-family="Georgia, 'Times New Roman', serif">
<defs>
  <style>
    .label-sm { font-size: 9px; }
    .label-md { font-size: 11px; }
    .label-lg { font-size: 13px; }
    .bold { font-weight: bold; }
    .mono { font-family: 'Courier New', monospace; }
  </style>
  <marker id="arr-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#c0392b"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#3a6a9a"/>
  </marker>
</defs>

<rect x="641" y="400" width="727" height="500" fill="#faf6ee" stroke="#c8bca8" stroke-width="1"/>
<rect x="641" y="400" width="727" height="24" fill="#3a2e1e"/>
<text x="1005" y="416" text-anchor="middle" font-size="10" fill="#f0ece4" letter-spacing="1.5">C — BREAKUP SEQUENCE &amp; FORCES</text>

<text x="1005" y="442" text-anchor="middle" font-size="9" fill="#2a2218" font-weight="bold">Aerodynamic force timeline — launch to vehicle breakup</text>

<text x="822" y="462" font-size="8" fill="#8a7a60" font-weight="bold">TIME</text>
<text x="892" y="462" font-size="8" fill="#8a7a60" font-weight="bold">PROGRESS</text>
<text x="1020" y="462" font-size="8" fill="#8a7a60" font-weight="bold">EVENT</text>

<line x1="818" y1="466" x2="1192" y2="466" stroke="#c8bca8" stroke-width="0.8"/>

<text x="872" y="483" text-anchor="end" font-size="8" fill="#5a4a28" font-weight="bold" class="mono">T+0s</text>
<rect x="878" y="472" width="120" height="16" fill="#e0d8c8" rx="1"/>
<rect x="878" y="472" width="120" height="16" fill="#2a7a2a" rx="1" opacity="0.7"/>
<text x="878" y="498" font-size="7.5" fill="#3a6030">Liftoff — all systems nominal</text>

<text x="872" y="521" text-anchor="end" font-size="8" fill="#5a4a28" font-weight="bold" class="mono">T+0.678s</text>
<rect x="878" y="510" width="120" height="16" fill="#e0d8c8" rx="1"/>
<rect x="878" y="510" width="2" height="16" fill="#c0392b" rx="1"/>
<text x="878" y="536" font-size="7.5" fill="#8a2010">First O-ring smoke (identified in post-mission film review)</text>

<text x="872" y="559" text-anchor="end" font-size="8" fill="#5a4a28" font-weight="bold" class="mono">T+58.788s</text>
<rect x="878" y="548" width="120" height="16" fill="#e0d8c8" rx="1"/>
<rect x="878" y="548" width="50" height="16" fill="#c0392b" rx="1" opacity="0.8"/>
<text x="878" y="574" font-size="7.5" fill="#8a2010">Continuous flame visible escaping right SRB field joint</text>

<text x="872" y="597" text-anchor="end" font-size="8" fill="#5a4a28" font-weight="bold" class="mono">T+64.660s</text>
<rect x="878" y="586" width="120" height="16" fill="#e0d8c8" rx="1"/>
<rect x="878" y="586" width="76" height="16" fill="#c0392b" rx="1" opacity="0.85"/>
<text x="878" y="612" font-size="7.5" fill="#8a2010">ET hydrogen tank breach — major fire plume / off-axis thrust</text>

<text x="872" y="635" text-anchor="end" font-size="8" fill="#5a4a28" font-weight="bold" class="mono">T+72.204s</text>
<rect x="878" y="624" width="120" height="16" fill="#e0d8c8" rx="1"/>
<rect x="878" y="624" width="104" height="16" fill="#c0392b" rx="1" opacity="0.9"/>
<text x="878" y="650" font-size="7.5" fill="#8a2010">Right SRB lower strut fails — SRB begins to rotate into ET</text>

<rect x="818" y="662" width="374" height="26" fill="#c0392b" rx="2"/>
<text x="872" y="679" text-anchor="end" font-size="8.5" fill="#ffe0d8" font-weight="bold" class="mono">T+73.162s</text>
<text x="885" y="679" font-size="8.5" fill="#fff" font-weight="bold">VEHICLE STRUCTURAL BREAKUP — aerodynamic forces</text>

<text x="1005" y="710" text-anchor="middle" font-size="9" fill="#2a2218" font-weight="bold">Structural loads at breakup</text>
<rect x="970" y="722" width="22" height="56" fill="#c8c0b0" stroke="#2a2218" stroke-width="1" rx="2"/>
<path d="M 992,722 L 1002,736 L 992,750 Z" fill="#c0b8a8" stroke="#2a2218" stroke-width="0.8"/>
<text x="981" y="790" text-anchor="middle" font-size="7" fill="#2a2218">Orbiter</text>

<path d="M 1020,734 Q 1050,718 1060,738 Q 1070,758 1046,762" stroke="#c0392b" stroke-width="2.5" fill="none" marker-end="url(#arr-red)"/>
<text x="1072" y="738" font-size="7.5" fill="#c0392b" font-weight="bold">SRB rotates into ET</text>
<text x="1072" y="750" font-size="7" fill="#c0392b">after lower strut failure</text>

<path d="M 886,750 L 965,750" stroke="#3a6a9a" stroke-width="2.5" marker-end="url(#arr-blue)"/>
<text x="880" y="746" text-anchor="end" font-size="7.5" fill="#3a6a9a" font-weight="bold">Mach 1.92</text>
<text x="880" y="758" text-anchor="end" font-size="7" fill="#3a6a9a">dynamic</text>
<text x="880" y="769" text-anchor="end" font-size="7" fill="#3a6a9a">pressure</text>

<rect x="818" y="796" width="374" height="56" fill="#f0e8d8" stroke="#c0a870" stroke-width="0.8" rx="3"/>
<text x="1005" y="812" text-anchor="middle" font-size="9" fill="#2a2218" font-weight="bold">Key Physical Parameters at Breakup</text>
<line x1="824" y1="816" x2="1186" y2="816" stroke="#c0a870" stroke-width="0.6"/>
<text x="824" y="830" font-size="8" fill="#4a3a20">Altitude:</text>
<text x="1186" y="830" text-anchor="end" font-size="8" fill="#c0392b" font-weight="bold">46,000 ft  (14,020 m)</text>
<text x="824" y="845" font-size="8" fill="#4a3a20">Velocity / dynamic pressure:</text>
<text x="1186" y="845" text-anchor="end" font-size="8" fill="#c0392b" font-weight="bold">Mach 1.92</text>
</svg>
