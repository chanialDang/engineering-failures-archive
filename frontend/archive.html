<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive - Engineering Failures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="archive-page">
    <nav class="navbar">
        <a href="index.html" class="nav-logo">EFA</a>
        <div class="nav-links">
            <a href="archive.html" class="nav-link">Archive</a>
            <a href="chat.html" class="nav-link">Chat</a>
            <a href="sources.html" class="nav-link">Sources</a>
            <a href="why.html" class="nav-link">Why I Made This</a>
        </div>
    </nav>

    <div class="container">
        <header class="archive-header">
            <div class="archive-eyebrow">Complete Database</div>
            <h1 class="archive-title">Disaster Archive</h1>
            <p class="archive-subtitle">50 engineering failures, documented.</p>
        </header>

        <!-- Controls -->
        <div class="controls-wrapper">
            <div class="search-container">
                <div class="search-icon">🔍</div>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search disasters..."
                    class="search-input"
                >
            </div>

            <div class="filters-section">
                <div class="section-label">FILTER BY DISCIPLINE</div>
                <div class="filters">
                    <button class="filter-chip active" data-discipline="all">
                        <span class="chip-text">ALL</span>
                        <span class="chip-count" id="count-all">50</span>
                    </button>
                    <button class="filter-chip" data-discipline="Civil">
                        <span class="chip-text">CIVIL</span>
                        <span class="chip-count" id="count-civil">0</span>
                    </button>
                    <button class="filter-chip" data-discipline="Mechanical">
                        <span class="chip-text">MECHANICAL</span>
                        <span class="chip-count" id="count-mechanical">0</span>
                    </button>
                    <button class="filter-chip" data-discipline="Electrical">
                        <span class="chip-text">ELECTRICAL</span>
                        <span class="chip-count" id="count-electrical">0</span>
                    </button>
                    <button class="filter-chip" data-discipline="Chemical">
                        <span class="chip-text">CHEMICAL</span>
                        <span class="chip-count" id="count-chemical">0</span>
                    </button>
                </div>
            </div>

            <div class="sort-results">
                <div class="sort-container">
                    <label>SORT BY</label>
                    <select id="sortSelect" class="sort-select">
                        <option value="year-desc">Newest First</option>
                        <option value="year-asc">Oldest First</option>
                        <option value="name-asc">A → Z</option>
                        <option value="name-desc">Z → A</option>
                    </select>
                </div>
                <div class="results-count" id="resultsCount">50 disasters</div>
            </div>
        </div>

        <!-- Grid -->
        <div class="grid" id="disastersGrid">
            <!-- Cards populated by JS -->
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">LOADING...</div>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-title">NO RESULTS</div>
            <div class="empty-text">Try different filters</div>
        </div>
    </div>

    <script src="archive.js"></script>
</body>
</html>
