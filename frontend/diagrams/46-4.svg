<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1080 742" xmlns="http://www.w3.org/2000/svg" width="1080" height="742" font-family="Georgia, 'Times New Roman', serif">
<defs>
  <style>
    .label-sm { font-size: 9px; }
    .label-md { font-size: 11px; }
    .label-lg { font-size: 13px; }
    .bold { font-weight: bold; }
    .mono { font-family: 'Courier New', monospace; }
  </style>
  <marker id="arr-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#c0392b"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#3a6a9a"/>
  </marker>
</defs>

<!-- BACKGROUND AND HEADER -->
<rect x="0" y="0" width="1080" height="742" fill="#faf6ee" stroke="#c8bca8" stroke-width="1"/>
<rect x="0" y="0" width="1080" height="26" fill="#3a2e1e"/>
<text x="540" y="17" text-anchor="middle" font-size="10" fill="#f0ece4" letter-spacing="1.5">C — BREAKUP SEQUENCE &amp; FORCES</text>

<!-- SECTION TITLE -->
<text x="540" y="46" text-anchor="middle" font-size="10" fill="#2a2218" font-weight="bold">Aerodynamic force timeline — launch to vehicle breakup</text>

<!-- COLUMN HEADERS -->
<!-- Time col: x=60–200, Progress bar col: x=210–570, Event col: x=585–1050 -->
<text x="130" y="64" text-anchor="middle" font-size="8" fill="#8a7a60" font-weight="bold" letter-spacing="1">TIME</text>
<text x="380" y="64" text-anchor="middle" font-size="8" fill="#8a7a60" font-weight="bold" letter-spacing="1">PROGRESS</text>
<text x="790" y="64" text-anchor="middle" font-size="8" fill="#8a7a60" font-weight="bold" letter-spacing="1">EVENT</text>
<line x1="50" y1="69" x2="1040" y2="69" stroke="#c8bca8" stroke-width="0.8"/>

<!-- ROW 1: T+0s -->
<text x="200" y="86" text-anchor="end" font-size="8.5" fill="#5a4a28" font-weight="bold" class="mono">T+0s</text>
<!-- Progress bar background -->
<rect x="210" y="76" width="340" height="16" fill="#e0d8c8" rx="2"/>
<!-- Progress fill: 100% green (nominal) -->
<rect x="210" y="76" width="340" height="16" fill="#2a7a2a" rx="2" opacity="0.75"/>
<!-- Event text -->
<text x="585" y="87" font-size="8.5" fill="#3a6030">Liftoff — all systems nominal</text>

<!-- ROW 2: T+0.678s -->
<text x="200" y="124" text-anchor="end" font-size="8.5" fill="#5a4a28" font-weight="bold" class="mono">T+0.678s</text>
<rect x="210" y="114" width="340" height="16" fill="#e0d8c8" rx="2"/>
<!-- Tiny red segment — first O-ring smoke: ~0.6% of bar -->
<rect x="210" y="114" width="7" height="16" fill="#c0392b" rx="2"/>
<text x="585" y="120" font-size="8.5" fill="#8a2010">First O-ring smoke puff visible</text>
<text x="585" y="132" font-size="7.5" fill="#8a2010">(identified in post-mission film review)</text>

<!-- ROW 3: T+58.788s -->
<text x="200" y="162" text-anchor="end" font-size="8.5" fill="#5a4a28" font-weight="bold" class="mono">T+58.788s</text>
<rect x="210" y="152" width="340" height="16" fill="#e0d8c8" rx="2"/>
<!-- ~42% red fill -->
<rect x="210" y="152" width="142" height="16" fill="#c0392b" rx="2" opacity="0.85"/>
<text x="585" y="158" font-size="8.5" fill="#8a2010">Continuous flame visible escaping</text>
<text x="585" y="170" font-size="7.5" fill="#8a2010">right SRB field joint</text>

<!-- ROW 4: T+64.660s -->
<text x="200" y="200" text-anchor="end" font-size="8.5" fill="#5a4a28" font-weight="bold" class="mono">T+64.660s</text>
<rect x="210" y="190" width="340" height="16" fill="#e0d8c8" rx="2"/>
<!-- ~63% red fill -->
<rect x="210" y="190" width="215" height="16" fill="#c0392b" rx="2" opacity="0.9"/>
<text x="585" y="196" font-size="8.5" fill="#8a2010">ET hydrogen tank breach —</text>
<text x="585" y="208" font-size="7.5" fill="#8a2010">major fire plume / off-axis thrust</text>

<!-- ROW 5: T+72.204s -->
<text x="200" y="238" text-anchor="end" font-size="8.5" fill="#5a4a28" font-weight="bold" class="mono">T+72.204s</text>
<rect x="210" y="228" width="340" height="16" fill="#e0d8c8" rx="2"/>
<!-- ~87% red fill -->
<rect x="210" y="228" width="294" height="16" fill="#c0392b" rx="2" opacity="0.92"/>
<text x="585" y="234" font-size="8.5" fill="#8a2010">Right SRB lower strut fails —</text>
<text x="585" y="246" font-size="7.5" fill="#8a2010">SRB begins to rotate into ET</text>

<!-- BREAKUP HIGHLIGHT ROW -->
<rect x="50" y="264" width="990" height="30" fill="#c0392b" rx="3"/>
<text x="200" y="283" text-anchor="end" font-size="9" fill="#ffe0d8" font-weight="bold" class="mono">T+73.162s</text>
<text x="215" y="283" font-size="9" fill="#ffffff" font-weight="bold">VEHICLE STRUCTURAL BREAKUP — aerodynamic forces exceed structural limits</text>

<!-- DIVIDER -->
<line x1="50" y1="310" x2="1040" y2="310" stroke="#c0a870" stroke-width="0.8" stroke-dasharray="4,3"/>

<!-- STRUCTURAL LOADS SECTION TITLE -->
<text x="540" y="333" text-anchor="middle" font-size="10" fill="#2a2218" font-weight="bold">Structural loads at breakup (T+73.162s)</text>

<!-- ORBITER DIAGRAM: centered in left region -->
<!-- Orbiter body: simple fuselage rectangle + nose cone -->
<rect x="380" y="355" width="60" height="150" fill="#c8c0b0" stroke="#2a2218" stroke-width="1.2" rx="3"/>
<!-- Nose cone -->
<polygon points="440,355 470,380 440,405" fill="#c0b8a8" stroke="#2a2218" stroke-width="0.8"/>
<!-- Wing suggestion: thin rects -->
<rect x="350" y="400" width="30" height="12" fill="#b8b0a0" stroke="#2a2218" stroke-width="0.8" rx="1"/>
<rect x="440" y="400" width="30" height="12" fill="#b8b0a0" stroke="#2a2218" stroke-width="0.8" rx="1"/>
<!-- Orbiter label -->
<text x="410" y="516" text-anchor="middle" font-size="8" fill="#2a2218">Orbiter</text>

<!-- SRB rotation arrow: red curve arcing from upper right toward ET -->
<path d="M 500,370 Q 560,340 580,375 Q 600,410 565,430" stroke="#c0392b" stroke-width="2.5" fill="none" marker-end="url(#arr-red)"/>
<!-- SRB rotation label -->
<text x="610" y="365" font-size="8.5" fill="#c0392b" font-weight="bold">SRB rotates into ET</text>
<text x="610" y="378" font-size="7.5" fill="#c0392b">after lower strut failure</text>

<!-- Dynamic pressure arrow: blue horizontal, approaching from left -->
<line x1="200" y1="430" x2="368" y2="430" stroke="#3a6a9a" stroke-width="2.5" marker-end="url(#arr-blue)"/>
<!-- Dynamic pressure label -->
<text x="195" y="425" text-anchor="end" font-size="8.5" fill="#3a6a9a" font-weight="bold">Mach 1.92</text>
<text x="195" y="438" text-anchor="end" font-size="7.5" fill="#3a6a9a">dynamic</text>
<text x="195" y="450" text-anchor="end" font-size="7.5" fill="#3a6a9a">pressure</text>

<!-- KEY PHYSICAL PARAMETERS BOX -->
<rect x="50" y="548" width="990" height="80" fill="#f0e8d8" stroke="#c0a870" stroke-width="1" rx="3"/>
<text x="540" y="568" text-anchor="middle" font-size="10" fill="#2a2218" font-weight="bold">Key Physical Parameters at Breakup</text>
<line x1="60" y1="574" x2="1030" y2="574" stroke="#c0a870" stroke-width="0.7"/>

<!-- Two-column parameter layout -->
<text x="70" y="592" font-size="8.5" fill="#4a3a20">Altitude:</text>
<text x="500" y="592" text-anchor="end" font-size="8.5" fill="#c0392b" font-weight="bold">46,000 ft  (14,020 m)</text>
<text x="70" y="610" font-size="8.5" fill="#4a3a20">Velocity / dynamic pressure:</text>
<text x="500" y="610" text-anchor="end" font-size="8.5" fill="#c0392b" font-weight="bold">Mach 1.92</text>

<text x="540" y="592" font-size="8.5" fill="#4a3a20">Time from launch:</text>
<text x="1030" y="592" text-anchor="end" font-size="8.5" fill="#c0392b" font-weight="bold">73.162 seconds</text>
<text x="540" y="610" font-size="8.5" fill="#4a3a20">Primary failure mode:</text>
<text x="1030" y="610" text-anchor="end" font-size="8.5" fill="#c0392b" font-weight="bold">Aerodynamic overload / structural separation</text>

<!-- FOOTER RULE -->
<line x1="50" y1="648" x2="1040" y2="648" stroke="#c8bca8" stroke-width="0.6"/>
<text x="540" y="662" text-anchor="middle" font-size="7.5" fill="#8a7a60" letter-spacing="0.8">STS-51-L CHALLENGER  ·  PANEL 4 OF 4  ·  BREAKUP SEQUENCE &amp; FORCES</text>

</svg>
