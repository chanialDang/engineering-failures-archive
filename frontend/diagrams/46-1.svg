<!-- FOOTER BAR (y 722–742)                                         -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<rect x="0" y="722" width="1080" height="20" fill="#2a2218"/>
<line x1="0" y1="722" x2="1080" y2="722" stroke="#c0a870" stroke-width="1.5"/>
<text x="540" y="735" text-anchor="middle" font-size="8.5" fill="#c0a870" letter-spacing="3">DETAIL PANELS — MECHANISM &amp; CONTEXT OF FAILURE</text>
</svg>
