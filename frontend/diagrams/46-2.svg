<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1080 742" xmlns="http://www.w3.org/2000/svg" width="1080" height="742" font-family="Georgia, 'Times New Roman', serif">
<defs>
  <marker id="arr-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#c0392b"/>
  </marker>
  <marker id="arr-orange" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#ff6020"/>
  </marker>
</defs>

<!-- BACKGROUND -->
<rect x="0" y="0" width="1080" height="742" fill="#faf6ee"/>

<!-- PANEL HEADER -->
<rect x="0" y="0" width="1080" height="36" fill="#3a2e1e"/>
<text x="540" y="23" text-anchor="middle" font-size="13" fill="#f0ece4" letter-spacing="2.5">A — O-RING JOINT CROSS-SECTION</text>

<!-- ============================================================ -->
<!-- SECTION 1: NOMINAL (WARM TEMPERATURE) -->
<!-- Left column: cross-section diagram, centered ~x=200 -->
<!-- Right column: annotation text, x~540–900 -->
<!-- ============================================================ -->

<!-- Section heading: NOMINAL -->
<text x="260" y="72" text-anchor="middle" font-size="13" fill="#2a7a2a" font-weight="bold" letter-spacing="1">NOMINAL — Warm Temperature</text>

<!-- Upper Tang Segment (nominal) -->
<rect x="90" y="84" width="340" height="36" fill="#8a8880" stroke="#2a2218" stroke-width="1.5" rx="2"/>
<text x="260" y="107" text-anchor="middle" font-size="12" fill="#f0e8d8">Upper Tang Segment</text>

<!-- Joint cavity (nominal) -->
<rect x="90" y="120" width="340" height="68" fill="#ddd8cc"/>

<!-- Putty fill (left portion) -->
<rect x="90" y="120" width="108" height="68" fill="#c8b888" opacity="0.80"/>
<text x="144" y="158" text-anchor="middle" font-size="10" fill="#5a4a20" font-weight="bold">PUTTY</text>

<!-- Primary O-ring (nominal — green, healthy) -->
<ellipse cx="267" cy="147" rx="36" ry="16" fill="#2a8a2a" stroke="#1a5a1a" stroke-width="2"/>
<text x="267" y="152" text-anchor="middle" font-size="10" fill="#e0f0e0" font-weight="bold">PRIMARY</text>

<!-- Backup O-ring (nominal — darker green) -->
<ellipse cx="352" cy="168" rx="28" ry="14" fill="#1a6a1a" stroke="#0a4a0a" stroke-width="1.5"/>
<text x="352" y="172" text-anchor="middle" font-size="10" fill="#e0f0e0">BACKUP</text>

<!-- Lower Clevis Segment (nominal) -->
<rect x="90" y="188" width="340" height="36" fill="#8a8880" stroke="#2a2218" stroke-width="1.5" rx="2"/>
<text x="260" y="211" text-anchor="middle" font-size="12" fill="#f0e8d8">Lower Clevis Segment</text>

<!-- Sealed status label (nominal) -->
<text x="260" y="244" text-anchor="middle" font-size="12" fill="#2a8a2a" font-weight="bold">&#x2713; Combustion gas path sealed</text>

<!-- NOMINAL annotation box (right column) -->
<rect x="500" y="78" width="480" height="116" fill="#eaf4ea" stroke="#2a7a2a" stroke-width="1" rx="3"/>
<text x="740" y="100" text-anchor="middle" font-size="12" fill="#2a7a2a" font-weight="bold">Normal operating conditions:</text>
<text x="520" y="120" font-size="11" fill="#2a5a2a">&#x2022;  O-ring elastic and flexible at 53°F+</text>
<text x="520" y="139" font-size="11" fill="#2a5a2a">&#x2022;  Seats quickly to joint geometry</text>
<text x="520" y="158" font-size="11" fill="#2a5a2a">&#x2022;  Seals gas path completely</text>
<text x="520" y="177" font-size="11" fill="#2a5a2a">&#x2022;  Both rings provide redundant backup</text>

<!-- ============================================================ -->
<!-- DIVIDER LINE -->
<!-- ============================================================ -->
<line x1="40" y1="270" x2="1040" y2="270" stroke="#c8bca8" stroke-width="1.5" stroke-dasharray="8,5"/>

<!-- ============================================================ -->
<!-- SECTION 2: FAILED (28°F LAUNCH CONDITIONS) -->
<!-- ============================================================ -->

<!-- Section heading: FAILED -->
<text x="260" y="302" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold" letter-spacing="1">FAILED — 28°F Launch Conditions</text>

<!-- Upper Tang Segment (failed) -->
<rect x="90" y="316" width="340" height="36" fill="#8a8880" stroke="#2a2218" stroke-width="1.5" rx="2"/>
<text x="260" y="339" text-anchor="middle" font-size="12" fill="#f0e8d8">Upper Tang Segment</text>

<!-- Joint cavity (failed) — gap arrows on both sides showing joint opening -->
<rect x="90" y="352" width="340" height="72" fill="#ddd8cc"/>

<!-- Left gap opening arrow -->
<path d="M 105,352 L 105,385" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arr-red)"/>
<!-- Right gap opening arrow -->
<path d="M 415,352 L 415,385" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arr-red)"/>
<!-- Gap label inside joint cavity -->
<text x="260" y="373" text-anchor="middle" font-size="10" fill="#c0392b" font-style="italic">gap opens under ignition pressure (~0.06")</text>

<!-- Primary O-ring (failed — cold, stiff, red) -->
<ellipse cx="267" cy="398" rx="36" ry="14" fill="#c0392b" stroke="#8a1818" stroke-width="2"/>
<text x="267" y="403" text-anchor="middle" font-size="10" fill="#ffe0d8" font-weight="bold">STIFF / COLD</text>

<!-- Lower Clevis Segment (failed) -->
<rect x="90" y="424" width="340" height="36" fill="#8a8880" stroke="#2a2218" stroke-width="1.5" rx="2"/>
<text x="260" y="447" text-anchor="middle" font-size="12" fill="#f0e8d8">Lower Clevis Segment</text>

<!-- Hot gas bypass arrows — shown just left of joint, pointing downward through gap -->
<path d="M 64,360 L 64,418" stroke="#ff6020" stroke-width="8" marker-end="url(#arr-orange)"/>
<path d="M 76,360 L 76,418" stroke="#ff6020" stroke-width="5" marker-end="url(#arr-orange)" opacity="0.55"/>
<!-- HOT GAS label — offset to the left, clear of arrows -->
<text x="38" y="395" text-anchor="middle" font-size="10" fill="#e05020" font-weight="bold" transform="rotate(-90,38,395)">HOT GAS</text>

<!-- Failure status label -->
<text x="260" y="478" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">&#x2717; Gas path NOT sealed — failure initiated</text>

<!-- FAILURE annotation box (right column) -->
<rect x="500" y="308" width="480" height="188" fill="#fff0ee" stroke="#c0392b" stroke-width="1.5" rx="3"/>
<text x="740" y="332" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">Why cold O-rings fail:</text>
<text x="520" y="356" font-size="11.5" fill="#5a2010">&#x2022;  Rubber stiffens ~6&#xD7; at 28°F vs. 53°F</text>
<text x="520" y="378" font-size="11.5" fill="#5a2010">&#x2022;  Cannot follow joint rotation under pressure</text>
<text x="520" y="400" font-size="11.5" fill="#5a2010">&#x2022;  Gap opens on ignition (~0.06 inches)</text>
<text x="520" y="422" font-size="11.5" fill="#5a2010">&#x2022;  5,800°F combustion gas bypasses ring</text>
<text x="520" y="448" font-size="11.5" fill="#c0392b" font-weight="bold">&#x2022;  Erosion begins at T+0.678 seconds</text>
<text x="520" y="470" font-size="11" fill="#8a3010" font-style="italic">  MTI engineers warned NASA — overruled</text>

<!-- ============================================================ -->
<!-- TEMPERATURE COMPARISON BAR (visual reinforcement) -->
<!-- ============================================================ -->
<text x="260" y="516" text-anchor="middle" font-size="11" fill="#5a4a30" letter-spacing="1">TEMPERATURE AT LAUNCH</text>

<!-- Temp scale bar background -->
<rect x="90" y="526" width="340" height="22" fill="#e8e0d0" stroke="#c8bca8" stroke-width="1" rx="2"/>
<!-- Cold zone (28°F range, ~left 22% of bar) -->
<rect x="90" y="526" width="74" height="22" fill="#3a6aaa" rx="2"/>
<text x="127" y="541" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="bold">28°F</text>
<!-- Design zone (53°F+) marker -->
<rect x="164" y="524" width="2" height="26" fill="#2a7a2a"/>
<text x="168" y="540" font-size="8.5" fill="#2a7a2a" font-weight="bold">53°F min</text>
<!-- Right label -->
<text x="340" y="541" font-size="9" fill="#5a4a30">design range</text>

<!-- ============================================================ -->
<!-- TIMELINE NOTE -->
<!-- ============================================================ -->
<text x="540" y="516" text-anchor="middle" font-size="11" fill="#5a4a30" letter-spacing="1">SEQUENCE</text>
<rect x="500" y="526" width="480" height="76" fill="#f4f0e8" stroke="#c8bca8" stroke-width="1" rx="2"/>
<text x="520" y="546" font-size="11" fill="#3a2e1e">T+0.000s — Ignition. Joint gap opens under pressure.</text>
<text x="520" y="564" font-size="11" fill="#c0392b">T+0.678s — First plume visible at right SRB joint.</text>
<text x="520" y="582" font-size="11" fill="#c0392b">T+58.788s — Plume becomes persistent, stable burn.</text>
<text x="520" y="600" font-size="11" fill="#8a1818" font-weight="bold">T+73.175s — Structural failure. Vehicle breakup.</text>

<!-- ============================================================ -->
<!-- FOOTER CITATION -->
<!-- ============================================================ -->
<line x1="40" y1="628" x2="1040" y2="628" stroke="#c8bca8" stroke-width="0.8"/>
<text x="540" y="648" text-anchor="middle" font-size="10" fill="#8a7a60" font-style="italic">Ref: Rogers Commission Report Vol. I, Chapter IV (1986) and Feynman personal appendix to Rogers Report</text>

</svg>
